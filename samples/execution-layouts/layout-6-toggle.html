<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout 6 — Toggle 2b / 3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../css/app.css" rel="stylesheet" />
  <link href="layout-shared.css" rel="stylesheet" />
</head>
<body>
  <div class="main-card">
    <h2 class="text-center mb-2 app-title">Layout 6 — Toggle All steps ↔ Active step</h2>
    <div id="chrome"></div>
    <p class="text-muted small mb-2">
      Use the selector left of each service icon to switch between interleaved (2b) and active-step (3).
    </p>
    <div id="serviceList" class="service-list"></div>
  </div>
  <script src="mock-data.js"></script>
  <script src="mock-utils.js"></script>
  <script>
    document.getElementById("chrome").innerHTML = MockUI.chrome("layout-6-toggle.html");

    /** Default: interleaved (2b). Per-service mode + active step. */
    const state = {};
    MOCK.services.forEach((svc) => {
      state[svc.idx] = {
        mode: "interleaved",
        activeStepId: svc.steps[0].id
      };
    });

    function bodyHtml(svc) {
      const st = state[svc.idx];
      if (st.mode === "interleaved") {
        return `${MockUI.sharedBlock(svc)}${MockUI.interleavedSteps(svc)}`;
      }
      const panels = svc.steps
        .map((step) => {
          const cls =
            step.id === st.activeStepId
              ? "instruction-panel active"
              : "instruction-panel";
          return MockUI.stepPanelHtml(svc, step.id, cls);
        })
        .join("");
      return `
        ${MockUI.compactStepsTable(svc, {
          activeStepId: st.activeStepId,
          clickable: true
        })}
        ${MockUI.sharedBlock(svc)}
        <div class="instruction-area">${panels}</div>
      `;
    }

    function render() {
      document.getElementById("serviceList").innerHTML = MOCK.services
        .map((svc, i) => {
          const prev = MOCK.services[i - 1];
          let groupHtml = "";
          if (i === 0 || svc.IsOlpnLevel !== !!prev?.IsOlpnLevel) {
            groupHtml = `<h3 class="service-group-title">${
              svc.IsOlpnLevel ? "oLPN Services" : "Item Services"
            }</h3>`;
          }
          return `${groupHtml}<article class="service-card" data-svc-card="${svc.idx}">
            ${MockUI.serviceHeader(svc, { stepViewMode: state[svc.idx].mode })}
            ${bodyHtml(svc)}
            ${MockUI.capturePlaceholder()}
          </article>`;
        })
        .join("");

      document.querySelectorAll("[data-step-view-select]").forEach((sel) => {
        sel.onchange = () => {
          const idx = Number(sel.dataset.svcIdx);
          state[idx].mode = sel.value;
          render();
        };
      });

      document.querySelectorAll("[data-step-row]").forEach((row) => {
        row.onclick = () => {
          const card = row.closest("[data-svc-card]");
          if (!card) return;
          const idx = Number(card.dataset.svcCard);
          state[idx].activeStepId = row.dataset.stepId;
          render();
        };
      });
    }

    render();
  </script>
</body>
</html>
