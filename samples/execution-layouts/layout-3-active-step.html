<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout 3 — Active step panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../css/app.css" rel="stylesheet" />
  <link href="layout-shared.css" rel="stylesheet" />
</head>
<body>
  <div class="main-card">
    <h2 class="text-center mb-2 app-title">Layout 3 — Active step panel</h2>
    <div id="chrome"></div>
    <p class="text-muted small">Click a step row to swap the instruction panel. Gift Wrap card shown; Dicks uses same pattern.</p>
    <article class="service-card" id="demoCard"></article>
  </div>
  <script src="mock-data.js"></script>
  <script src="mock-utils.js"></script>
  <script>
    document.getElementById("chrome").innerHTML = MockUI.chrome("layout-3-active-step.html");
    const svc = MOCK.services.find((s) => s.ProvidedServiceId === "Gift Wrap" && s.IsOlpnLevel);
    let activeStepId = svc.steps[0].id;

    function render() {
      const panels = svc.steps
        .map((st) => {
          const cls =
            st.id === activeStepId
              ? "instruction-panel active"
              : "instruction-panel";
          return MockUI.stepPanelHtml(svc, st.id, cls);
        })
        .join("");
      document.getElementById("demoCard").innerHTML = `
        ${MockUI.serviceHeader(svc)}
        ${MockUI.compactStepsTable(svc, { activeStepId, clickable: true })}
        ${MockUI.sharedBlock(svc)}
        <div id="instructionArea">${panels}</div>
        ${MockUI.capturePlaceholder("Instructions panel shows one step at a time")}
      `;
      document.querySelectorAll("[data-step-row]").forEach((row) => {
        row.onclick = () => {
          activeStepId = row.dataset.stepId;
          render();
        };
      });
    }
    render();
  </script>
</body>
</html>
