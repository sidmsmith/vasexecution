<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout 2 — All step panels</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../css/app.css" rel="stylesheet" />
  <link href="layout-shared.css" rel="stylesheet" />
</head>
<body>
  <div class="main-card">
    <h2 class="text-center mb-2 app-title">Layout 2 — All step panels (Stacked)</h2>
    <div id="chrome"></div>
    <div id="serviceList" class="service-list"></div>
  </div>
  <script src="mock-data.js"></script>
  <script src="mock-utils.js"></script>
  <script>
    document.getElementById("chrome").innerHTML = MockUI.chrome("layout-2-all-panels.html");
    document.getElementById("serviceList").innerHTML = MOCK.services
      .map((svc, i) => {
        const prev = MOCK.services[i - 1];
        let groupHtml = "";
        if (i === 0 || svc.IsOlpnLevel !== !!prev?.IsOlpnLevel) {
          groupHtml = `<h3 class="service-group-title">${
            svc.IsOlpnLevel ? "oLPN Services" : "Item Services"
          }</h3>`;
        }
        return `${groupHtml}<article class="service-card">
          ${MockUI.serviceHeader(svc)}
          ${MockUI.compactStepsTable(svc)}
          ${MockUI.sharedBlock(svc)}
          ${MockUI.allStepPanels(svc)}
          ${MockUI.capturePlaceholder()}
        </article>`;
      })
      .join("");
  </script>
</body>
</html>
