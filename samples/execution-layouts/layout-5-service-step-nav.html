<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout 5 — Service + step nav</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../css/app.css" rel="stylesheet" />
  <link href="layout-shared.css" rel="stylesheet" />
</head>
<body>
  <div class="main-card">
    <h2 class="text-center mb-2 app-title">Layout 5 — Main/detail + step sub-nav</h2>
    <div id="chrome"></div>
    <div class="mock-main-detail">
      <nav class="mock-line-nav" id="serviceNav"></nav>
      <div class="detail-pane" id="detailPane"></div>
    </div>
  </div>
  <script src="mock-data.js"></script>
  <script src="mock-utils.js"></script>
  <script>
    document.getElementById("chrome").innerHTML = MockUI.chrome("layout-5-service-step-nav.html");
    let activeSvcIdx = 2;
    let activeStepId = "Wrap";

    function renderNav() {
      document.getElementById("serviceNav").innerHTML = `
        <div class="form-label mb-2">Provided services</div>
        ${MOCK.services
          .map((svc) => {
            const cfg = MockUI.typeCfg(svc);
            const meta = svc.ItemId ? svc.ItemId : "oLPN-level";
            return `<button type="button" class="mock-line-nav-item${
              svc.idx === activeSvcIdx ? " active" : ""
            }" data-svc-idx="${svc.idx}">
              <div>
                <div class="nav-service-title">${svc.idx}. ${MockUI.esc(
              svc.ProvidedServiceId
            )}</div>
                <div class="nav-service-meta">${MockUI.esc(meta)} · ${svc.steps.length} steps</div>
              </div>
              <img src="${MockUI.esc(cfg.icon)}" alt="" onerror="this.remove()" />
            </button>`;
          })
          .join("")}
      `;
      document.querySelectorAll("[data-svc-idx]").forEach((btn) => {
        btn.onclick = () => {
          activeSvcIdx = Number(btn.dataset.svcIdx);
          const svc = MOCK.services.find((s) => s.idx === activeSvcIdx);
          activeStepId = svc.steps[0].id;
          renderNav();
          renderDetail();
        };
      });
    }

    function renderDetail() {
      const svc = MOCK.services.find((s) => s.idx === activeSvcIdx);
      const stepTabs = svc.steps
        .map(
          (st) =>
            `<button type="button" class="step-tab${
              st.id === activeStepId ? " active" : ""
            }" data-step-tab="${MockUI.esc(st.id)}">${MockUI.esc(st.id)}</button>`
        )
        .join("");
      const panelLines = MockUI.stepInstructions(svc, activeStepId);
      document.getElementById("detailPane").innerHTML = `
        <article class="service-card is-active-service">
          ${MockUI.serviceHeader(svc)}
          ${MockUI.sharedBlock(svc)}
          <div class="step-tabs">${stepTabs}</div>
          ${MockUI.compactStepsTable(svc, { activeStepId })}
          <div class="step-panel instruction-panel active">
            <h5>Instructions: ${MockUI.esc(activeStepId)}</h5>
            <ul class="vas-instruction-list mb-0">
              ${panelLines.map((t) => `<li>${MockUI.esc(t)}</li>`).join("")}
            </ul>
          </div>
          ${MockUI.capturePlaceholder()}
        </article>
      `;
      document.querySelectorAll("[data-step-tab]").forEach((btn) => {
        btn.onclick = () => {
          activeStepId = btn.dataset.stepTab;
          renderDetail();
        };
      });
    }

    renderNav();
    renderDetail();
  </script>
</body>
</html>
