<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout 4 — Step tabs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../css/app.css" rel="stylesheet" />
  <link href="layout-shared.css" rel="stylesheet" />
</head>
<body>
  <div class="main-card">
    <h2 class="text-center mb-2 app-title">Layout 4 — Step tabs</h2>
    <div id="chrome"></div>
    <article class="service-card" id="demoCard"></article>
  </div>
  <script src="mock-data.js"></script>
  <script src="mock-utils.js"></script>
  <script>
    document.getElementById("chrome").innerHTML = MockUI.chrome("layout-4-step-tabs.html");
    const svc = MOCK.services.find((s) => s.ProvidedServiceId === "Gift Wrap" && s.IsOlpnLevel);
    let activeStepId = svc.steps[0].id;

    function render() {
      const tabs = svc.steps
        .map(
          (st) =>
            `<button type="button" class="step-tab${
              st.id === activeStepId ? " active" : ""
            }" data-step-tab="${MockUI.esc(st.id)}">${MockUI.esc(st.id)}</button>`
        )
        .join("");
      const panels = svc.steps
        .map((st) => {
          const lines = MockUI.stepInstructions(svc, st.id);
          return `<div class="step-tab-panel${
            st.id === activeStepId ? " active" : ""
          }" data-step-panel="${MockUI.esc(st.id)}">
            <ul class="vas-instruction-list mb-0">
              ${lines.map((t) => `<li>${MockUI.esc(t)}</li>`).join("")}
            </ul>
          </div>`;
        })
        .join("");
      document.getElementById("demoCard").innerHTML = `
        ${MockUI.serviceHeader(svc)}
        ${MockUI.sharedBlock(svc)}
        <div class="step-tabs">${tabs}</div>
        ${MockUI.compactStepsTable(svc, { activeStepId })}
        <div class="step-panel">${panels}</div>
        ${MockUI.capturePlaceholder()}
      `;
      document.querySelectorAll("[data-step-tab]").forEach((btn) => {
        btn.onclick = () => {
          activeStepId = btn.dataset.stepTab;
          render();
        };
      });
    }
    render();
  </script>
</body>
</html>
