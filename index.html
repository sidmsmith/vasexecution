<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VAS Execution v0.1.0</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <div class="main-card">
    <button type="button" class="camera-btn" id="cameraBtn" title="Take miscellaneous photos" aria-label="Take miscellaneous photos">
      <i class="fas fa-camera"></i>
      <span class="photo-count" id="cameraPhotoCount">0</span>
    </button>
    <input type="file" id="cameraFileInput" accept="image/*" capture="environment" multiple hidden />
    <button type="button" class="theme-selector-btn" id="themeSelectorBtn" title="Select Theme">
      <i class="fas fa-cog"></i>
    </button>
    <img id="themeLogo" class="theme-logo" alt="Theme Logo" />
    <h2 class="text-center mb-2 app-title">VAS Execution</h2>

    <div class="mb-3" id="orgSection">
      <label class="form-label" for="org">ORG:</label>
      <div class="criteria-row">
        <input type="text" id="org" class="form-control" placeholder="Enter ORG" maxlength="20" autocomplete="off" />
        <button type="button" class="btn btn-primary" id="orgBtn">Sign in</button>
      </div>
    </div>

    <div id="mainUI" style="display:none">
      <label class="form-label" for="olpn">oLPN:</label>
      <div class="criteria-row mb-2">
        <input type="text" id="olpn" class="form-control" placeholder="Enter oLPN" autocomplete="off" />
        <button type="button" class="btn btn-primary px-4" id="inspectBtn" disabled>Enter Valid oLPN</button>
      </div>
    </div>

    <div id="status" class="status-bar info" role="status"></div>

    <div id="results" style="display:none">
      <div id="olpnMeta" class="olpn-meta"></div>
      <div class="execution-bar">
        <button type="button" class="btn btn-primary" id="completeSelectedBtn" disabled>Complete Selected</button>
        <button type="button" class="btn btn-primary" id="completeAllBtn" disabled>Complete All</button>
        <button type="button" class="btn btn-outline-secondary" id="selectAllBtn">Select All Open</button>
      </div>
      <div id="serviceList" class="service-list"></div>
    </div>
  </div>

  <div class="modal fade" id="themeModal" tabindex="-1" aria-labelledby="themeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="themeModalLabel">Select Theme</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="list-group" id="themeList"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="diagramModal" tabindex="-1" aria-labelledby="diagramModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="diagramModalLabel" hidden></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body diagram-modal-body">
          <button type="button" class="diagram-nav diagram-nav-prev" id="diagramModalPrev" aria-label="Previous image" hidden>
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <div class="diagram-modal-stage text-center">
            <img id="diagramModalImg" class="diagram-modal-img" alt="" />
            <p id="diagramModalCaption" class="diagram-modal-caption mt-2 mb-0" hidden></p>
          </div>
          <button type="button" class="diagram-nav diagram-nav-next" id="diagramModalNext" aria-label="Next image" hidden>
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="busy-overlay" id="busyOverlay" hidden>
    <div class="busy-content">
      <div class="spinner-border text-light" role="status" aria-hidden="true"></div>
      <span id="busyMessage">Working...</span>
    </div>
  </div>

  <script src="/js/inspection-themes.js"></script>
  <script src="/js/item-image-preview.js"></script>
  <script src="/js/vas-config.js"></script>
  <script src="/js/vas-pads.js"></script>
  <script src="/js/vas-image-modal.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
